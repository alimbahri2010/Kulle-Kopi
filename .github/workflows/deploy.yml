name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Ganti ke master jika branch utama Anda adalah master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite mengeluarkan file statis hasil build di sini
          branch: gh-pages # Branch tujuan untuk serving halaman static
